name: release

# Publishes to PyPI when you publish a GitHub Release (tag like v0.1.0).
# Uses PyPI Trusted Publishing (OIDC) — no API token stored in the repo.
# One-time PyPI setup: create a "pending publisher" for project `akyla-mcp`
#   owner: AkilaAnalytics   repo: akyla-mcp
#   workflow: release.yml    environment: pypi
# at https://pypi.org/manage/account/publishing/

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: uv build
      - name: Check metadata
        run: uvx twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
