# Smithery deployment — container runtime (https://smithery.ai/docs/build/deployments)
# Smithery builds the Dockerfile and hosts the server, serving MCP at /mcp on $PORT.
# Each user's config (their Akyla key) is passed per session and read by the server
# from the request query string (see _key_from_query in server.py).
runtime: "container"
build:
  dockerfile: "Dockerfile"
  dockerBuildPath: "."
startCommand:
  type: "http"
  configSchema:
    type: "object"
    required: ["akylaApiKey"]
    properties:
      akylaApiKey:
        type: "string"
        title: "Akyla API key"
        description: "Free key from https://app.akyla.ai/developers"
  exampleConfig:
    akylaApiKey: "ak_live_xxxxxxxxxxxxxxxx"
